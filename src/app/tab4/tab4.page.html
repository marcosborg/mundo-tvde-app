<app-header></app-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Inspecoes programadas</ion-card-title>
      <ion-card-subtitle>Executar inspeções de rotina</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" color="primary" (click)="goToInspections()">Abrir inspeções</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Documentos da empresa</ion-card-title>
      <ion-card-subtitle>Lista de documentos enviados à empresa</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        @for (document of documents; track document) {
          <ion-item button="true"
            (click)="getDocument(document.file[0].original_url)">
            <ion-label>
              {{ document.name }}
            </ion-label>
          </ion-item>
        }
      </ion-list>
    </ion-card-content>
  </ion-card>

</ion-content>
<app-chat></app-chat>
