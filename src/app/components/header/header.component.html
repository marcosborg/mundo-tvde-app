<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title class="ion-text-center">
      <ion-img src="../../../assets/logo-header.png" class="logo-header"></ion-img>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToInspections()" class="inspections-shortcut">
        <ion-icon name="car-sport-outline" slot="icon-only"></ion-icon>
        @if (pendingRoutineCount > 0) {
          <ion-badge color="danger" class="header-badge">
            {{ pendingRoutineCount }}
          </ion-badge>
        }
      </ion-button>
      <ion-button (click)="onLogout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
