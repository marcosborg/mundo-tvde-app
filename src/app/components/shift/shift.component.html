<ion-fab slot="fixed" vertical="top" horizontal="end">
  <ion-fab-button color="primary" (click)="setOpen(true)">
    <ion-icon name="timer"></ion-icon>
  </ion-fab-button>
</ion-fab>
<ion-modal [isOpen]="isModalOpen" [presentingElement]="presentingElement" (didPresent)="load()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Turnos de condução</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="setOpen(false)">Fechar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      @if (status == 'end') {
        <ion-button color="success" expand="block" (click)="newTimeLog('start')">
          Iniciar turno
        </ion-button>
      }
      @if (status == 'start' || status == 'continue') {
        <ion-grid>
          <ion-row>
            <ion-col>
              <ion-button color="medium" expand="block" (click)="newTimeLog('pause')">
                Pausar turno
              </ion-button>
            </ion-col>
            <ion-col>
              <ion-button color="primary" expand="block" (click)="newTimeLog('end')">
                Concluir turno
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      }
      @if (status == 'pause') {
        <ion-button color="secondary" expand="block" (click)="newTimeLog('continue')">
          Retomar turno
        </ion-button>
      }
      <ion-button expand="full" color="primary" (click)="openTimeLogs()">
        Consultar turnos
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>
